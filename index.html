<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 { color: #4a90e2; }
        button {
            padding: 10px 20px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #357abd; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Olá, Mundo!</h1>
        <p>Esta é uma página HTML estruturada de forma simples e direta.</p>
        
        <ul>
            <li>Item de lista 1</li>
            <li>Item de lista 2</li>
            <li>Item de lista 3</li>
        </ul>

        <button onclick="mensagem()">Clique aqui</button>
    </div>

    <script>
        function mensagem() {
            alert('Você clicou no botão!');
        }
    </script>

</body>
</html>
